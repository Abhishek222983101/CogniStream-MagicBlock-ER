services:
  - type: web
    name: cognistream-backend
    env: python
    plan: free # Force the free tier
    buildCommand: |
      ./build.sh
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: TRIALMATCH_SKIP_LLM
        value: "1"
      - key: MISTRAL_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

